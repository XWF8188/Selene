name: Fetch Repository Releases 和 Assets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  fetch-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest releases info
        env:
          REPO: MoonTechLab/Selene
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${REPO}/releases" > releases.json
          echo "Release metadata saved to releases.json"
      
      - name: Download assets from releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          asset_urls=$(jq -r '.[].assets[].browser_download_url' releases.json)
          for url in $asset_urls; do
            fname=$(basename "$url")
            curl -L -H "Authorization: token $GH_TOKEN" "$url" -o "release-assets/$fname"
            echo "Downloaded $fname"
          done

      - name: Upload assets as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/
